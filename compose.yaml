services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blogdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bloguser:blogpass@db:5432/blogdb
      SECRET_KEY: dev-secret-key-change-in-production
      SUPERUSER_EMAIL: admin@co.jp
      SUPERUSER_PASSWORD: 'admin[1234;"'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
